services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: de_zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: de_kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD", "bash", "-c", "kafka-topics --bootstrap-server kafka:9092 --list"]
      interval: 10s
      timeout: 10s
      retries: 10

  postgres:
    image: postgres:16
    container_name: de_postgres
    environment:
      POSTGRES_DB: trips
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql:/docker-entrypoint-initdb.d

  spark-consumer:
    build:
      context: .
      dockerfile: Dockerfile.spark
    container_name: de_spark_consumer
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_started
    env_file:
      - .env.example
    volumes:
      - ./spark:/app/spark

  airflow:
    build:
      context: .
      dockerfile: Dockerfile.airflow
    container_name: de_airflow
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_started
    env_file:
      - .env.example
    environment:
      AIRFLOW_HOME: /opt/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "false"
      AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"
      AIRFLOW__CORE__EXECUTOR: SequentialExecutor
      PYTHONPATH: /opt/airflow:/opt/airflow/dags:/opt/airflow/repo
    command: bash -c "airflow standalone"
    ports:
      - "8080:8080"
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./data:/opt/airflow/data
      - ./:/opt/airflow/repo

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: de_api
    depends_on:
      postgres:
        condition: service_started
    env_file:
      - .env.example
    ports:
      - "8000:8000"
    volumes:
      - ./:/app

volumes:
  postgres_data:
